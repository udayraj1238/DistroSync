# ── DistroSync Docker Compose ─────────────────────────────────
# One command to run the entire distributed system:
#   docker-compose up --build
#
# Architecture:
#   broker (1)          — TCP:5555 + HTTP:8000 dashboard
#   worker-1..3 (3)     — Consume from "tasks" queue (4 processes each)
#   producer-simulator   — Generates 200 tasks/second for benchmarking
#
# Persistence:
#   SQLite WAL-mode database stored in ./data/ (survives restarts)
#
# Dashboard:
#   Open http://localhost:8000 to see real-time metrics

version: "3.9"

services:
  # ── Broker ───────────────────────────────────────────────────
  broker:
    build:
      context: .
      dockerfile: docker/Dockerfile.broker
    ports:
      - "5555:5555"   # TCP broker protocol
      - "8000:8000"   # HTTP dashboard + metrics API
    volumes:
      - ./data:/app/data   # SQLite WAL persisted to host
    healthcheck:
      test: ["CMD", "python", "-c", "import socket; s=socket.create_connection(('localhost',5555),2); s.close()"]
      interval: 5s
      timeout: 3s
      retries: 3
      start_period: 5s
    restart: unless-stopped
    environment:
      - PYTHONUNBUFFERED=1

  # ── Workers ──────────────────────────────────────────────────
  worker-1:
    build:
      context: .
      dockerfile: docker/Dockerfile.worker
    environment:
      - BROKER_HOST=broker
      - BROKER_PORT=5555
      - QUEUE_NAME=tasks
      - MAX_PROCESSES=4
      - WORKER_ID=worker-1
      - PYTHONUNBUFFERED=1
    depends_on:
      broker:
        condition: service_healthy
    restart: unless-stopped

  worker-2:
    build:
      context: .
      dockerfile: docker/Dockerfile.worker
    environment:
      - BROKER_HOST=broker
      - BROKER_PORT=5555
      - QUEUE_NAME=tasks
      - MAX_PROCESSES=4
      - WORKER_ID=worker-2
      - PYTHONUNBUFFERED=1
    depends_on:
      broker:
        condition: service_healthy
    restart: unless-stopped

  worker-3:
    build:
      context: .
      dockerfile: docker/Dockerfile.worker
    environment:
      - BROKER_HOST=broker
      - BROKER_PORT=5555
      - QUEUE_NAME=tasks
      - MAX_PROCESSES=4
      - WORKER_ID=worker-3
      - PYTHONUNBUFFERED=1
    depends_on:
      broker:
        condition: service_healthy
    restart: unless-stopped

  # ── Producer Simulator ───────────────────────────────────────
  producer-simulator:
    build:
      context: .
      dockerfile: docker/Dockerfile.producer
    environment:
      - BROKER_HOST=broker
      - BROKER_PORT=5555
      - TASKS_PER_SECOND=200
      - QUEUE_NAME=tasks
      - PYTHONUNBUFFERED=1
    depends_on:
      broker:
        condition: service_healthy
    restart: unless-stopped
